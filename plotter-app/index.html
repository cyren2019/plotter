<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plotter</title>
  <style>
    :root {
      --accent: #3b82f6;
      --accent-bg: #eff6ff;
      --accent-border: #bfdbfe;
      --text: #374151;
      --text-h: #111827;
      --border: #e5e7eb;
      --bg: #ffffff;
      --sidebar-width: 260px;
    }
    [data-theme="dark"] {
      --text: #d1d5db;
      --text-h: #f9fafb;
      --border: #374151;
      --bg: #111827;
      --accent-bg: #1e3a5f;
      --accent-border: #3b82f6;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }
    #app { display: flex; flex-direction: column; height: 100vh; position: relative; }

    /* Header */
    header {
      height: 48px; min-height: 48px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
      z-index: 10;
    }
    header .title {
      display: flex; align-items: center; gap: 8px;
      font-size: 14px; font-weight: 600; color: var(--text-h);
    }
    header .title svg { width: 20px; height: 20px; color: var(--accent); }
    header .actions {
      display: flex; align-items: center; gap: 12px;
    }
    .github-link {
      display: inline-flex; align-items: center; justify-content: center;
      width: 32px; height: 32px;
      border-radius: 6px;
      color: var(--text);
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .github-link:hover {
      color: var(--accent);
      background: var(--accent-bg);
    }
    .version-badge {
      font-size: 11px; font-weight: 500;
      color: var(--text);
      opacity: 0.6;
      flex-shrink: 0;
      cursor: default;
    }
    .version-badge.has-update {
      opacity: 1;
      color: #f59e0b;
      cursor: pointer;
      position: relative;
    }
    .version-badge.has-update::after {
      content: '';
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #f59e0b;
      margin-left: 4px;
      vertical-align: middle;
      animation: version-pulse 2s infinite;
    }
    @keyframes version-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .theme-toggle {
      display: inline-flex; align-items: center; justify-content: center;
      width: 32px; height: 32px;
      border-radius: 6px; border: none;
      background: transparent; color: var(--text);
      cursor: pointer;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .theme-toggle:hover {
      color: var(--accent);
      background: var(--accent-bg);
    }
    header .file-name {
      font-size: 12px; color: var(--text); opacity: 0.5;
      max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      text-align: center;
      flex: 1;
    }
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      height: 32px; padding: 0 12px;
      font-size: 12px; font-weight: 500;
      border-radius: 6px; border: 1px solid var(--border);
      background: var(--bg); color: var(--text);
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn:hover {
      background: var(--accent-bg); color: var(--accent); border-color: var(--accent-border);
    }
    .btn:active { transform: scale(0.97); }
    .lang-link {
      display: inline-flex; align-items: center; justify-content: center;
      width: 32px; height: 32px;
      border-radius: 6px; border: none;
      background: transparent; color: var(--text);
      cursor: pointer;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .lang-link:hover {
      color: var(--accent);
      background: var(--accent-bg);
    }
    #importBtn { min-width: 110px; justify-content: center; }
    #emptyImportBtn { min-width: 110px; justify-content: center; }
    .btn-primary {
      background: var(--accent); color: white; border-color: var(--accent);
    }
    .btn-primary:hover { opacity: 0.9; }
    .btn.active {
      background: var(--accent); color: white; border-color: var(--accent);
    }

    /* Error banner */
    .error-banner {
      display: none; align-items: center; justify-content: space-between;
      padding: 8px 16px;
      background: #fef2f2; border-bottom: 1px solid #fecaca;
      flex-shrink: 0; z-index: 10;
    }
    .error-banner .msg {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; color: #b91c1c;
    }
    .error-banner .close {
      background: none; border: none; cursor: pointer;
      color: #f87171; font-size: 16px; line-height: 1;
    }
    .error-banner .close:hover { color: #dc2626; }

    /* Main */
    main {
      display: flex; flex: 1;
      overflow: hidden;
    }

    /* Empty state */
    .empty-state {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 20px;
    }
    .empty-state .icon {
      width: 80px; height: 80px;
      color: var(--accent); opacity: 0.3;
    }
    .empty-state h2 {
      margin: 0;
      font-size: 16px; font-weight: 500; color: var(--text-h);
    }
    .empty-state p {
      margin: 0;
      font-size: 12px; color: var(--text); opacity: 0.4;
    }

    /* Sidebar */
    .sidebar {
      width: var(--sidebar-width);
      min-width: 10vw;
      max-width: 40vw;
      display: flex; flex-direction: column;
      border-right: 1px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
    }
    .resizer {
      width: 4px;
      cursor: col-resize;
      background: transparent;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .resizer:hover, .resizer.dragging {
      background: var(--accent);
    }
    .sidebar-header {
      padding: 16px 16px 12px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-header .title-row {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 12px;
    }
    .sidebar-header .title-row svg { width: 16px; height: 16px; color: var(--accent); }
    .sidebar-header .title-row span { font-size: 14px; font-weight: 500; color: var(--text-h); }
    .search-box {
      position: relative; margin-bottom: 8px;
    }
    .search-box input {
      width: 100%; padding: 6px 8px 6px 28px;
      font-size: 12px;
      border: 1px solid var(--border); border-radius: 6px;
      background: var(--bg); color: var(--text);
      outline: none;
    }
    .search-box input:focus { border-color: var(--accent-border); }
    .search-box input::placeholder { color: var(--text); opacity: 0.3; }
    .search-box svg {
      position: absolute; left: 8px; top: 50%; transform: translateY(-50%);
      width: 14px; height: 14px; color: var(--text); opacity: 0.35;
    }
    .sidebar-actions {
      display: flex; gap: 8px; margin-bottom: 8px;
    }
    .sidebar-actions .btn { flex: 1; justify-content: center; }
    .sidebar-actions .btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .selected-count {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; color: var(--text); opacity: 0.5;
    }
    .selected-count .badge {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 18px; height: 18px; padding: 0 4px;
      border-radius: 9999px;
      font-size: 10px; font-weight: 500;
      background: var(--accent); color: white;
    }
    .selected-count .badge.empty {
      background: var(--text); opacity: 0.1; color: var(--text);
    }

    .var-list {
      flex: 1; overflow-y: auto; overflow-x: hidden;
    }
    .time-row {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--accent-bg);
    }
    .time-row svg { width: 14px; height: 14px; color: var(--accent); opacity: 0.8; }
    .time-row .name { font-size: 12px; color: var(--text-h); font-weight: 500; flex: 1; }
    .time-row .tag {
      font-size: 10px; padding: 2px 6px;
      border-radius: 9999px;
      background: var(--accent);
      color: #fff;
      font-weight: 500;
    }
    .time-select {
      flex: 1;
      padding: 4px 8px;
      font-size: 12px;
      font-family: inherit;
      color: var(--text-h);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      outline: none;
      cursor: pointer;
    }
    .time-select:focus {
      border-color: var(--accent-border);
    }
    .var-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.15s;
    }
    .var-item:hover { background: rgba(128, 128, 128, 0.08); }
    .var-item.selected { background: var(--accent-bg); }
    .var-item .checkbox {
      width: 14px; height: 14px;
      border: 1.5px solid var(--border); border-radius: 3px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s;
    }
    .var-item:hover .checkbox { border-color: var(--text); opacity: 0.3; }
    .var-item.selected .checkbox {
      background: var(--accent); border-color: var(--accent);
    }
    .var-item.selected .checkbox svg { display: block; }
    .var-item .checkbox svg { display: none; width: 10px; height: 10px; color: white; }
    .var-item .name {
      font-size: 12px; flex: 1;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .var-item.selected .name { color: var(--accent); font-weight: 500; }
    .var-item .dot {
      width: 6px; height: 6px; border-radius: 9999px;
      background: var(--accent); flex-shrink: 0;
    }

    /* Plot area */
    .plot-section {
      flex: 1; display: flex; flex-direction: column;
      min-width: 0;
    }
    .plot-tabs {
      display: flex; align-items: center; gap: 4px;
      padding: 8px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .plot-tabs .btn { padding: 6px 12px; }
    .ts-toggle {
      display: flex;
      align-items: center;
      gap: 2px;
      margin-left: auto;
      padding: 2px;
      background: var(--border);
      border-radius: 6px;
    }
    .ts-toggle .btn {
      padding: 4px 10px;
      font-size: 11px;
      border: none;
      background: transparent;
    }
    .ts-toggle .btn.active {
      background: var(--bg);
      color: var(--accent);
      box-shadow: 0 1px 2px rgba(0,0,0,0.1);
    }
    .var-limit-toast {
      display: none;
      margin-top: 8px;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 12px;
      color: #b45309;
      background: #fef3c7;
      border: 1px solid #fde68a;
      animation: toastIn 0.2s ease;
    }
    @keyframes toastIn {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .plot-container {
      flex: 1; position: relative; min-height: 0;
      overflow-y: auto;
    }
    .plot-label {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .plot-label span {
      font-size: 12px; font-weight: 500;
      padding: 2px 10px;
      border-radius: 9999px;
      background: var(--accent-bg); color: var(--accent);
      border: 1px solid var(--accent-border);
    }
    #chart { width: 100%; height: 100%; }
    .chart-msg {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
    }
    .chart-msg p {
      padding: 12px 20px;
      border-radius: 8px;
      background: var(--bg); opacity: 0.9;
      border: 1px solid var(--border);
      font-size: 14px; color: var(--text); opacity: 0.6;
      backdrop-filter: blur(4px);
    }

    /* Drag overlay */
    .drag-overlay {
      display: none;
      position: absolute; inset: 0; z-index: 50;
      flex-direction: column; align-items: center; justify-content: center; gap: 16px;
      background: var(--accent-bg); opacity: 0.9;
      border: 3px dashed var(--accent);
      border-radius: 8px;
      pointer-events: none;
      backdrop-filter: blur(2px);
    }
    .drag-overlay svg { width: 56px; height: 56px; color: var(--accent); }
    .drag-overlay p { font-size: 16px; font-weight: 600; color: var(--accent); }

    input[type="file"] { display: none; }

    /* Binary column indicators */
    .bin-badge {
      font-size: 9px; padding: 1px 5px;
      border-radius: 9999px;
      background: #3b82f6; color: white; font-weight: 500;
      flex-shrink: 0;
    }
    [data-theme="dark"] .bin-badge { background: #2563eb; }
    .bin-toggle {
      padding: 2px 8px; font-size: 10px; border: 1px solid var(--border);
      background: transparent; color: var(--text); cursor: pointer;
      border-radius: 9999px; transition: all 0.15s; flex-shrink: 0;
      font-family: inherit; line-height: 1.4;
    }
    .bin-toggle:hover:not(:disabled) { border-color: #3b82f6; color: #3b82f6; }
    .bin-toggle.active { background: #3b82f6; border-color: #3b82f6; color: white; }
    [data-theme="dark"] .bin-toggle.active { background: #2563eb; border-color: #2563eb; }
    .bin-toggle:disabled { opacity: 0.35; cursor: not-allowed; }
    .var-item[data-binary] { background: #eff6ff; }
    [data-theme="dark"] .var-item[data-binary] { background: rgba(59, 130, 246, 0.08); }
    .var-item.bin-active { border-left: 3px solid #3b82f6; background: #eff6ff; }
    [data-theme="dark"] .var-item.bin-active { border-left: 3px solid #2563eb; background: rgba(59, 130, 246, 0.12); }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text); opacity: 0.2; }
  </style>
</head>

    <div class="drag-overlay" id="dragOverlay">

        <button class="btn btn-primary" id="importBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>

      </div>
    </header>

    <div class="error-banner" id="errorBanner">
      <div class="msg">

    <input type="file" id="fileInput" accept=".csv,.xls,.xlsx,.log,.txt" />

        <p id="emptyDesc">支持 CSV、Excel (.xls, .xlsx)、日志 (.log, .txt) 格式</p>
        <button class="btn btn-primary" id="emptyImportBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          <span id="emptyImportText"> 选择文件</span>
        </button>
      </div>
    </main>
  </div>

  <script src="lib/dayjs.min.js"></script>

  <script src="lib/echarts.min.js"></script>
  <script src="lib/echarts-gl.min.js"></script>

  <script>
    // ===================== Time Parser =====================
    dayjs.extend(dayjs_plugin_customParseFormat);
    const EXCEL_EPOCH = dayjs('1899-12-30');

    function excelSerialToDate(serial) {
      const adjustedSerial = serial >= 61 ? Math.floor(serial) - 1 : Math.floor(serial);
      const date = EXCEL_EPOCH.add(adjustedSerial, 'day');
      const fractionalDay = serial - Math.floor(serial);
      const milliseconds = Math.round(fractionalDay * 24 * 60 * 60 * 1000);
      return date.add(milliseconds, 'millisecond').toDate();
    }

    const TIME_FORMATS = [
      'YYYY-MM-DDTHH:mm:ssZ', 'YYYY-MM-DDTHH:mm:ss', 'YYYY-MM-DDTHH:mm:ss.SSSZ',
      'YYYY-MM-DDTHH:mm:ss.SSS', 'YYYY-MM-DD', 'DD/MM/YYYY', 'MM/DD/YYYY',
      'YYYY/MM/DD', 'YYYY-MM-DD HH:mm:ss', 'DD/MM/YYYY HH:mm',
      'MM/DD/YYYY HH:mm', 'YYYY/MM/DD HH:mm:ss', 'YYYY-MM-DD HH:mm',
      'YYYY/MM/DD HH:mm', 'MM-DD-YYYY HH:mm A', 'MM-DD-YYYY hh:mm A',
      'DD-MM-YYYY HH:mm', 'DD-MM-YYYY HH:mm:ss',
      'YYYY年M月D日 HH时mm分', 'YYYY年M月D日 HH时mm分ss秒', 'YYYY年M月D日',
      'YYYYMMDDHHmmss', 'YYYYMMDDHHmm', 'YYYYMMDD',
      'YYYY-MM-DDTHHmmss', 'YYYY-MM-DDTHHmm',
    ];

    function parseTime(value) {
      if (typeof value === 'number') {
        if (!Number.isFinite(value) || value <= 0) return null;
        if (value >= 1) return excelSerialToDate(value);
        return null;
      }
      const trimmed = String(value).trim();
      if (trimmed === '') return null;

      // Handle "YYYY-MM-DD HH:mm:ss NNNms" format
      const msMatch = trimmed.match(/^(\d{4}-\d{2}-\d{2}\s+\d{1,2}:\d{2}:\d{2})\s+(\d{1,3})\s*ms$/i);
      if (msMatch) {
        const d = dayjs(msMatch[1]);
        if (d.isValid()) {
          return d.add(parseInt(msMatch[2], 10), 'millisecond').toDate();
        }
      }

      const native = dayjs(trimmed);
      if (native.isValid()) return native.toDate();
      for (const fmt of TIME_FORMATS) {
        const p = dayjs(trimmed, fmt, true);
        if (p.isValid()) return p.toDate();
      }
      for (const fmt of TIME_FORMATS) {
        const p = dayjs(trimmed, fmt, false);
        if (p.isValid()) return p.toDate();
      }
      return null;
    }

    function isTimeString(value) {
      return parseTime(value) !== null;
    }


    function detectBinaryColumns(headers, rows, timeColumn) {
      const cols = new Set();
      const bits = new Map();

      for (const h of headers) {
        if (h === timeColumn) continue;

        let maxVal = 0;
        let isPositiveInt = true;
        let hasValue = false;

        for (const row of rows) {
          const v = row[h];
          if (v === null || v === undefined) continue;
          const n = Number(v);
          hasValue = true;
          if (!Number.isInteger(n) || n < 0) {
            isPositiveInt = false;
            break;
          }
          if (n > maxVal) maxVal = n;
        }

        if (hasValue && isPositiveInt && maxVal < 65536) {
          cols.add(h);
          bits.set(h, maxVal <= 255 ? 8 : 16);
        }
      }

      return { cols, bits };
    }

    function detectColumnFormat(column, rows) {
      const sampleSize = Math.min(rows.length, 10);
      const validDates = [];
      for (let i = 0; i < sampleSize; i++) {
        const val = rows[i]?.[column];
        if (val != null && val !== '') {
          const d = parseTime(String(val));
          if (d) validDates.push(d);
        }
      }
      if (validDates.length === 0) return 'unknown';
      const hasTime = validDates.some(d => d.getHours() !== 0 || d.getMinutes() !== 0 || d.getSeconds() !== 0);
      const hasDateRange = validDates.length > 1 && validDates.some(d => d.getDate() !== validDates[0].getDate());
      if (hasTime && hasDateRange) return 'datetime';
      if (hasTime) return 'time';
      return 'date';
    }

    // ===================== Data Parser =====================
    function normalizeValue(value) {
      if (value == null) return null;
      if (value instanceof Date) return value;
      if (typeof value === 'number') return value;
      if (typeof value === 'string') {
        const t = value.trim();
        if (t === '') return null;
        const n = Number(t);
        if (!Number.isNaN(n)) return n;
        return t;
      }
      return null;
    }

    function processRows(headers, rawRows, timeColumn) {
      return rawRows.map(raw => {
        const row = {};
        for (const h of headers) {
          const val = raw[h];
          if (h === timeColumn && val != null && val !== '') {
            const parsed = parseTime(String(val));
            row[h] = parsed ?? normalizeValue(val);
          } else {
            row[h] = normalizeValue(val);
          }
        }
        return row;
      });
    }

    function readFileAsArrayBuffer(file) {
      return new Promise((resolve, reject) => {
        const r = new FileReader();
        r.onload = () => resolve(r.result);
        r.onerror = () => reject(new Error(t('read_failed')));
        r.readAsArrayBuffer(file);
      });
    }

    function readFileAsText(file) {
      return new Promise((resolve, reject) => {
        const r = new FileReader();
        r.onload = () => resolve(r.result);
        r.onerror = () => reject(new Error(t('read_failed')));
        r.readAsText(file);
      });
    }

    function splitCSVLine(line, sep) {
      if (!line.includes('"')) return line.split(sep).map(f => f.trim());
      const fields = [];
      let field = '', inQuotes = false, i = 0;
      while (i < line.length) {
        const ch = line[i];
        if (inQuotes) {
          if (ch === '"') {
            if (i + 1 < line.length && line[i + 1] === '"') { field += '"'; i++; }
            else { inQuotes = false; }
          } else { field += ch; }
        } else {
          if (ch === '"') { inQuotes = true; }
          else if (ch === sep) { fields.push(field.trim()); field = ''; i++; continue; }
          else { field += ch; }
        }
        i++;
      }
      fields.push(field.trim());
      return fields;
    }

    function detectSeparator(sample) {
      const lines = sample.split('\n').filter(l => l.trim() !== '');
      if (lines.length === 0) return ',';
      const comma = (lines[0].match(/,/g) || []).length;
      const semi = (lines[0].match(/;/g) || []).length;
      return semi > comma ? ';' : ',';
    }

    async function parseCSV(file) {
      const buffer = await readFileAsArrayBuffer(file);
      let text;
      try {
        // 优先尝试 UTF-8，遇到非法序列则抛异常
        const decoder = new TextDecoder('utf-8', { fatal: true });
        text = decoder.decode(new Uint8Array(buffer));
      } catch (e) {
        // 回退到 GB18030（兼容 GBK、GB2312），解决中文编码乱码
        try {
          const decoder = new TextDecoder('gb18030', { fatal: false });
          text = decoder.decode(new Uint8Array(buffer));
        } catch (e2) {
          // 最终兜底：UTF-8 非严格模式
          const decoder = new TextDecoder('utf-8', { fatal: false });
          text = decoder.decode(new Uint8Array(buffer));
        }
      }
      const sep = detectSeparator(text);
      const lines = text.split('\n').filter(l => l.trim() !== '');
      if (lines.length === 0) return { headers: [], rawRows: [], rows: [], timeColumn: '', timeFormat: 'unknown' };
      const headers = splitCSVLine(lines[0], sep);
      const rawRows = [];
      const sampleRows = []; // only first 10 rows for time format detection
      for (let i = 1; i < lines.length; i++) {
        const fields = splitCSVLine(lines[i], sep);
        const row = {};
        for (let j = 0; j < headers.length; j++) {
          row[headers[j]] = normalizeValue(j < fields.length ? fields[j] : '');
        }
        rawRows.push(row);
        if (i <= 10) sampleRows.push(row); // rows 1-10 (first 10 data rows)
      }
      const timeColumn = headers[0] || '';
      const timeFormat = detectColumnFormat(timeColumn, sampleRows);
      return { headers, rawRows, rows: processRows(headers, rawRows, timeColumn), timeColumn, timeFormat };
    }

    async function parseExcel(file) {
      const buffer = await readFileAsArrayBuffer(file);
      const workbook = XLSX.read(new Uint8Array(buffer), { type: 'array' });
      const sheetName = workbook.SheetNames[0];
      if (!sheetName) return { headers: [], rows: [], timeColumn: '', timeFormat: 'unknown' };
      const sheet = workbook.Sheets[sheetName];
      const rawRowsRaw = XLSX.utils.sheet_to_json(sheet, { defval: '' });
      if (rawRowsRaw.length === 0) return { headers: [], rawRows: [], rows: [], timeColumn: '', timeFormat: 'unknown' };
      const headers = Object.keys(rawRowsRaw[0]);
      // Merge normalize into single pass, collect sample for time format detection
      const rawRows = [];
      const sampleRows = [];
      for (let i = 0; i < rawRowsRaw.length; i++) {
        const row = {};
        for (const h of headers) row[h] = normalizeValue(rawRowsRaw[i][h]);
        rawRows.push(row);
        if (i < 10) sampleRows.push(row);
      }
      const timeColumn = headers[0] || '';
      const timeFormat = detectColumnFormat(timeColumn, sampleRows);
      return { headers, rawRows, rows: processRows(headers, rawRows, timeColumn), timeColumn, timeFormat };
    }

    }

      debounced.cancel = () => { clearTimeout(timer); timer = null; };
      return debounced;

    function computeValueRanges(parsed) {
      const ranges = {};
      for (const h of parsed.headers) {
        if (h === parsed.timeColumn) continue;
        let min = Infinity, max = -Infinity;
        for (const row of parsed.rows) {
          const v = row[h];
          if (v === null || v === undefined || isNaN(Number(v)) || !isFinite(Number(v))) continue;
          const n = Number(v);
          if (n < min) min = n;
          if (n > max) max = n;
        }
        if (min !== Infinity) {
          ranges[h] = { min, max };
        }
      }
      return ranges;
    }

    function compareVersions(a, b) {
      // Parse semver strings like 'v1.1.2' or '1.1.2'
      const parse = (v) => v.replace(/^v/, '').split('.').map(Number);
      const pa = parse(a), pb = parse(b);
      for (let i = 0; i < Math.max(pa.length, pb.length); i++) {
        const na = pa[i] || 0, nb = pb[i] || 0;
        if (na !== nb) return na - nb;
      }
      return 0;
    }

    async function checkVersion() {

          signal: AbortSignal.timeout(5000)
        });
        if (resp.ok) {
          const data = await resp.json();
          const remote = data.tag_name || '';
          if (remote && compareVersions(remote, CURRENT_VERSION) > 0) {
            latestVersion = remote;
          }
        }
      } catch (_) {
        // Silently ignore — offline, rate-limited, etc.
      }
      updateVersionBadges();
    }

      const releasesUrl = 'https://github.com/cyren2019/plotter/releases';

          badge.classList.add('has-update');
          badge.title = t('new_version', { v: latestVersion });
          if (!badge.textContent.includes('→')) {
            badge.textContent = `${CURRENT_VERSION} → ${latestVersion}`;
          }
          badge.onclick = () => window.open(releasesUrl, '_blank');
        } else {
          badge.classList.remove('has-update');
          badge.title = '';
          badge.textContent = CURRENT_VERSION;
          badge.onclick = null;
        }
      });

            <span>${t('var_select')}</span>
          </div>
          <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 8px;">
            <div class="search-box" style="flex: 1; margin-bottom: 0;">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              <input type="text" id="${searchId}" placeholder="${t('search_placeholder')}">
            </div>
            <button class="btn" id="deselectAllBtn" style="flex-shrink: 0;">${t('deselect_all')}</button>
          </div>
          <div class="selected-count">
            <span class="badge ${selectedVars.length === 0 ? 'empty' : ''}">${selectedVars.length}</span>
            <span>/ ${vars.length} ${t('var_count')}</span>
            ${(() => {
              const max = getMaxSelectable();
              if (max !== Infinity) {
                return `<span style="opacity:0.5">${t('max_limit', { n: max })}</span>`;
              }
              return '';
            })()}
          </div>
          <div class="var-limit-toast" id="varLimitToast"></div>
        </div>
        <div class="var-list" id="varList"></div>
      `;

      const varList = sidebar.querySelector('#varList');

      // Time row
      const timeRow = document.createElement('div');
      timeRow.className = 'time-row';
      const selectId = 'timeColumnSelect' + Date.now();
      const options = data.headers.map(h =>
        `<option value="${h}" ${h === data.timeColumn ? 'selected' : ''}>${h}</option>`
      ).join('');
      timeRow.innerHTML = `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <select class="time-select" id="${selectId}">
          ${options}
        </select>
      `;
      varList.appendChild(timeRow);

      const timeSelect = timeRow.querySelector('#' + selectId);
      timeSelect.addEventListener('change', (e) => {
        const newTimeColumn = e.target.value;
        if (newTimeColumn === data.timeColumn) return;

        // Remove new time column from selected vars if present
        if (selectedVars.includes(newTimeColumn)) {
          selectedVars = selectedVars.filter(v => v !== newTimeColumn);
        }

        // Re-process rows with new time column
        data.rows = processRows(data.headers, data.rawRows, newTimeColumn);
        data.timeColumn = newTimeColumn;
        data.timeFormat = detectColumnFormat(newTimeColumn, data.rows);
        // Recompute value ranges (old time column is now a data column)
        data.valueRanges = computeValueRanges(data);

        renderApp();
      });

      function renderVars(filter = '') {
        const filtered = filter.trim()
          ? vars.filter(v => v.toLowerCase().includes(filter.toLowerCase().trim()))
          : vars;

        // Remove existing var items and empty messages
        varList.querySelectorAll('.var-item, .var-empty').forEach(el => el.remove());

        if (filtered.length === 0 && vars.length > 0) {
          const empty = document.createElement('div');
          empty.className = 'var-empty';
          empty.style.cssText = 'padding: 40px 16px; text-align: center; font-size: 12px; color: var(--text); opacity: 0.3;';
          empty.textContent = t('no_match');
          varList.appendChild(empty);
          return;
        }

        filtered.forEach(v => {
          const item = document.createElement('div');
          const isSelected = selectedVars.includes(v);
          const isBinary = binaryColumns.has(v);
          const binMode = isBinary ? (binaryMode.get(v) || 'dec') : null;
          const binDisabled = plotType !== 'time-series' || timeSeriesMode === 'merged';

          item.className = 'var-item' + (isSelected ? ' selected' : '') + (binMode === 'bin' ? ' bin-active' : '');
          if (isBinary) item.setAttribute('data-binary', '');

          // Build right-side content (binary dot + toggle)
          let rightContent = '';
          if (isBinary) {
            const disabledAttr = binDisabled ? 'disabled' : '';
            const activeClass = binMode === 'bin' ? 'active' : '';
            const titleText = getBinToggleTitle(v, binDisabled);
            rightContent = `
              <button class="bin-toggle ${activeClass}" ${disabledAttr} title="${titleText}">BIN</button>
            `;
          }

          item.innerHTML = `
            <div class="checkbox">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
            <span class="name" title="${escapeHtml(v)}">${escapeHtml(v)}</span>
            ${rightContent}
          `;
          item.addEventListener('click', () => {
            if (selectedVars.includes(v)) {
              selectedVars = selectedVars.filter(s => s !== v);
            } else {
              const max = getMaxSelectable();
              if (selectedVars.length >= max) {
                const toast = sidebar.querySelector('#varLimitToast');
                if (toast) {
                  const modeKey = plotType === 'time-series' ? 'time_series' : plotType === 'xy' ? 'xy_plot' : 'xyz_plot';
                  toast.textContent = t('msg_var_limit', { mode: t(modeKey), n: max });
                  toast.style.display = 'block';
                  clearTimeout(toast._hideTimer);
                  toast._hideTimer = setTimeout(() => { toast.style.display = 'none'; }, 2000);
                }
                return;
              }
              selectedVars.push(v);
            }
            // Preserve zoom state before targeted re-render
            saveZoomState();
            // Targeted update: toggle class, update badge, re-render chart only
            item.classList.toggle('selected', selectedVars.includes(v));
            updateSelectedCountBadge();
            updateChartMsg();
            renderChart();
          });
          // Attach binary toggle event listener (toggle on click)
          if (isBinary) {
            const binBtn = item.querySelector('.bin-toggle');
            if (binBtn) {
              binBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (!binBtn.disabled) {
                  // Read current mode from global state (not closure, which is stale after targeted updates)
                  const currentMode = binaryMode.get(v) || 'dec';
                  const newMode = currentMode === 'bin' ? 'dec' : 'bin';
                  setBinaryMode(v, newMode);
                }
              });
            }
          }
          varList.appendChild(item);
        });
      }

      renderVars();

      // CSS visibility-based search filter (no DOM recreation)
      const applyVarFilter = (filterText) => {
        const lower = filterText.toLowerCase().trim();
        const items = varList.querySelectorAll('.var-item');
        let visibleCount = 0;
        items.forEach(item => {
          const nameEl = item.querySelector('.name');
          const name = nameEl ? nameEl.textContent : '';
          const visible = !lower || name.toLowerCase().includes(lower);
          item.style.display = visible ? '' : 'none';
          if (visible) visibleCount++;
        });
        // Show/hide "no matching variables" message
        let emptyEl = varList.querySelector('.var-empty');
        if (visibleCount === 0 && items.length > 0) {
          if (!emptyEl) {
            emptyEl = document.createElement('div');
            emptyEl.className = 'var-empty';
            emptyEl.style.cssText = 'padding: 40px 16px; text-align: center; font-size: 12px; color: var(--text); opacity: 0.3;';
            emptyEl.textContent = t('no_match');
            varList.appendChild(emptyEl);
          }
          emptyEl.style.display = '';
        } else if (emptyEl) {
          emptyEl.style.display = 'none';
        }
      };
      const filterVarItems = debounce(applyVarFilter, 150);
      activeFilterFn = filterVarItems;
      sidebar.querySelector('#' + searchId).addEventListener('input', (e) => {
        filterVarItems(e.target.value);
      });

      sidebar.querySelector('#deselectAllBtn').addEventListener('click', () => {
        selectedVars = [];
        for (const col of binaryColumns) {
          binaryMode.set(col, 'dec');
        }
        // Preserve zoom state before targeted re-render
        saveZoomState();
        // Clear all .selected and .bin-active classes on existing DOM
        varList.querySelectorAll('.var-item').forEach(el => {
          el.classList.remove('selected', 'bin-active');
          const toggle = el.querySelector('.bin-toggle');
          if (toggle) toggle.classList.remove('active');
        });
        updateSelectedCountBadge();
        updateChartMsg();
        renderChart();
      });

      const plotSection = document.createElement('section');
      plotSection.className = 'plot-section';

      const tsToggleVisible = plotType === 'time-series';
      plotSection.innerHTML = `
        <nav class="plot-tabs">
          <button class="btn ${plotType === 'time-series' ? 'active' : ''}" data-type="time-series">${t('time_series')}</button>
          <button class="btn ${plotType === 'xy' ? 'active' : ''}" data-type="xy">${t('xy_plot')}</button>
          <button class="btn ${plotType === 'xyz' ? 'active' : ''}" data-type="xyz">${t('xyz_plot')}</button>
          <div style="display: ${tsToggleVisible ? 'flex' : 'none'}; align-items: center; gap: 4px; margin-left: auto;">
            <div class="ts-toggle" data-ts="auto-scale" style="display: ${timeSeriesMode === 'separate' ? 'flex' : 'none'}">
              <button class="btn ${separateAutoScale ? 'active' : ''}" data-auto-scale="toggle">${t('auto_scale')}</button>
            </div>
            <div class="ts-toggle">
              <button class="btn" data-reset="zoom">${t('reset_zoom')}</button>
            </div>
            <div class="ts-toggle">
              <button class="btn ${timeSeriesMode === 'merged' ? 'active' : ''}" data-mode="merged">${t('merged')}</button>
              <button class="btn ${timeSeriesMode === 'separate' ? 'active' : ''}" data-mode="separate">${t('separate')}</button>
            </div>
          </div>
        </nav>
        <div class="plot-label"><span>${getModeLabel()}</span></div>
        <div class="plot-container">
          <div id="chart"></div>
          <div class="chart-msg" id="chartMsg"></div>
        </div>
      `;

      plotSection.querySelectorAll('.plot-tabs .btn[data-type]').forEach(btn => {
        btn.addEventListener('click', () => {
          plotType = btn.dataset.type;
          // Reset binary mode to dec when switching to merged mode
          if (plotType === 'time-series' && timeSeriesMode === 'merged') {
            for (const col of binaryColumns) {
              binaryMode.set(col, 'dec');
            }
          }
          const max = getMaxSelectable();
          if (selectedVars.length > max) {
            selectedVars = selectedVars.slice(0, max);
          }
          renderApp();
        });
      });

      plotSection.querySelectorAll('.ts-toggle .btn[data-mode]').forEach(btn => {
        btn.addEventListener('click', () => {
          timeSeriesMode = btn.dataset.mode;
          // Reset binary mode to dec when switching to merged mode
          if (timeSeriesMode === 'merged') {
            for (const col of binaryColumns) {
              binaryMode.set(col, 'dec');
            }
          }
          // Update active button states inline
          const toggle = btn.closest('.ts-toggle');
          if (toggle) {
            toggle.querySelectorAll('.btn[data-mode]').forEach(b => {
              b.classList.toggle('active', b.dataset.mode === timeSeriesMode);
            });
          }
          // Show/hide auto-scale button (use data attribute, not positional selector)
          const autoScaleToggle = plotSection.querySelector('.ts-toggle[data-ts="auto-scale"]');
          if (autoScaleToggle) {
            autoScaleToggle.style.display = timeSeriesMode === 'separate' ? 'flex' : 'none';
          }
          // Update bin controls enabled/disabled state
          updateBinControlsState();
          // Update mode label
          const label = plotSection.querySelector('.plot-label span');
          if (label) label.textContent = getModeLabel();
          // Preserve zoom state before re-render
          saveZoomState();
          renderChart();
        });
      });

      const autoScaleBtn = plotSection.querySelector('.btn[data-auto-scale]');
      if (autoScaleBtn) {
        autoScaleBtn.addEventListener('click', () => {
          separateAutoScale = !separateAutoScale;
          autoScaleBtn.classList.toggle('active', separateAutoScale);
          // Preserve zoom position across auto-scale toggle
          if (chartInstance) {
            const opt = chartInstance.getOption();
            if (opt && opt.dataZoom && opt.dataZoom.length > 0) {
              restoreZoom = { start: opt.dataZoom[0].start, end: opt.dataZoom[0].end };
            }
          }
          renderChart();
        });
      }

      const resetZoomBtn = plotSection.querySelector('.btn[data-reset="zoom"]');
      if (resetZoomBtn) {
        resetZoomBtn.addEventListener('click', () => {
          if (chartInstance) {
            chartInstance.dispatchAction({
              type: 'dataZoom',
              start: 0,
              end: 100,
            });
          }
        });
      }

      mainArea.innerHTML = '';
      mainArea.appendChild(sidebar);

      const resizer = document.createElement('div');
      resizer.className = 'resizer';
      mainArea.appendChild(resizer);

      let isResizing = false;
      resizer.addEventListener('mousedown', (e) => {
        isResizing = true;
        resizer.classList.add('dragging');
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
        const startX = e.clientX;
        const startWidth = sidebar.offsetWidth;

        function onMouseMove(e) {
          if (!isResizing) return;
          const newWidth = Math.min(Math.max(180, startWidth + (e.clientX - startX)), window.innerWidth / 2);
          document.documentElement.style.setProperty('--sidebar-width', newWidth + 'px');
          if (chartInstance) requestAnimationFrame(() => chartInstance.resize());
        }

        function onMouseUp() {
          isResizing = false;
          resizer.classList.remove('dragging');
          document.body.style.cursor = '';
          document.body.style.userSelect = '';
          document.removeEventListener('mousemove', onMouseMove);
          document.removeEventListener('mouseup', onMouseUp);
        }

        document.addEventListener('mousemove', onMouseMove);
        document.addEventListener('mouseup', onMouseUp);
      });

      mainArea.appendChild(plotSection);

      // Restore search value and re-filter using CSS visibility (preserves all DOM elements)
      const newSearchInput = sidebar.querySelector('#' + searchId);
      if (newSearchInput && savedSearchValue) {
        newSearchInput.value = savedSearchValue;
        applyVarFilter(savedSearchValue);
      }

      // Restore scroll position of var-list after re-rendering
      const newVarList = sidebar.querySelector('#varList');
      if (newVarList && savedScrollTop > 0) {
        newVarList.scrollTop = savedScrollTop;
      }

      requestAnimationFrame(() => renderChart());
    }

    function getModeLabel() {
      switch (plotType) {
        case 'time-series': return t('mode_ts');
        case 'xy': return t('mode_xy');
        case 'xyz': return t('mode_xyz');
        default: return '';
      }
    }

    function getMaxSelectable() {
      if (plotType === 'time-series') return 10;
      if (plotType === 'xy') return 2;
      if (plotType === 'xyz') return 3;
      return Infinity;
    }

    // ===================== Targeted UI Helpers =====================
    // Lightweight DOM updates that avoid a full renderApp() rebuild.

    function updateSelectedCountBadge() {
      const badge = document.querySelector('.selected-count .badge');
      if (!badge) return;
      badge.textContent = selectedVars.length;
      badge.classList.toggle('empty', selectedVars.length === 0);
    }

    function updateChartMsg() {
      const msgEl = document.getElementById('chartMsg');
      if (!msgEl) return;
      const msg = getChartMessage();
      if (msg) {
        msgEl.style.display = 'flex';
        let p = msgEl.querySelector('p');
        if (!p) { p = document.createElement('p'); msgEl.appendChild(p); }
        p.textContent = msg;
      } else {
        msgEl.style.display = 'none';
      }
    }

    function updateSingleVarItemState(varName) {
      const items = document.querySelectorAll('.var-item');
      items.forEach(el => {
        const nameEl = el.querySelector('.name');
        if (nameEl && nameEl.textContent === varName) {
          el.classList.toggle('selected', selectedVars.includes(varName));
          const isBin = binaryColumns.has(varName);
          const binMode = isBin ? (binaryMode.get(varName) || 'dec') : null;
          el.classList.toggle('bin-active', binMode === 'bin');
          const btn = el.querySelector('.bin-toggle');
          if (btn) {
            btn.classList.toggle('active', binMode === 'bin');
            const binDisabled = plotType !== 'time-series' || timeSeriesMode === 'merged';
            btn.disabled = binDisabled;
            btn.title = getBinToggleTitle(varName, binDisabled);
          }
        }
      });
    }

    function updateBinControlsState() {
      const items = document.querySelectorAll('.var-item[data-binary]');
      const binDisabled = plotType !== 'time-series' || timeSeriesMode === 'merged';
      items.forEach(el => {
        const btn = el.querySelector('.bin-toggle');
        const varName = el.querySelector('.name')?.textContent || '';
        if (btn) {
          btn.disabled = binDisabled;
          btn.title = getBinToggleTitle(varName, binDisabled);
        }
      });
    }

    // ===================== Chart Rendering =====================
    function renderChart() {
      const container = document.getElementById('chart');
      const msgEl = document.getElementById('chartMsg');
      if (!container || !data) return;

      // Lazy-init chart instance: reuse if exists and still in the DOM,
      // re-create if renderApp() rebuilt the DOM (old canvas destroyed)
      let isNewInstance = false;
      if (!chartInstance || !document.contains(chartInstance.getDom())) {
        if (chartInstance) {
          try { chartInstance.dispose(); } catch (e) { /* ignore */ }
          chartInstance = null;
        }
        if (!container.parentElement) return;
        chartInstance = echarts.init(container);
        isNewInstance = true;
      }

      const msg = getChartMessage();
      if (msg) {
        // Clear chart canvas so old data doesn't show behind the message
        if (chartInstance) {
          try { chartInstance.clear(); } catch (e) { /* ignore */ }
        }
        msgEl.style.display = 'flex';
        msgEl.querySelector('p')?.remove();
        const p = document.createElement('p');
        p.textContent = msg;
        msgEl.appendChild(p);
        return;
      }
      msgEl.style.display = 'none';

      // Pre-set container height before setOption to ensure correct canvas size
      // Must match constants in buildTimeSeriesOption() separate mode
      if (plotType === 'time-series' && timeSeriesMode === 'separate') {
        const varsToPlot = selectedVars.slice(0, 10);
        const rowHeight = 200, rowHeightBit = 25, labelHeight = 10, gap = 20, topPad = 8, bottomGap = 8;
        let totalHeight = topPad;
        for (let i = 0; i < varsToPlot.length; i++) {
          const v = varsToPlot[i];
          const isBinVar = binaryColumns.has(v) && binaryMode.get(v) === 'bin';
          const bitCount = isBinVar ? (binaryBits.get(v) || 8) : 0;
          totalHeight += isBinVar ? (bitCount * rowHeightBit) : rowHeight;
          totalHeight += labelHeight;
          if (i < varsToPlot.length - 1) totalHeight += gap;
        }
        totalHeight += bottomGap;
        container.style.height = totalHeight + 'px';
      } else {
        container.style.height = '100%';
      }

      chartInstance.resize(); // ensure canvas matches container size

      // Double-click to reset zoom (attach once)
      if (isNewInstance) {
        chartInstance.on('dblclick', () => {
          chartInstance.dispatchAction({
            type: 'dataZoom',
            start: 0,
            end: 100,
          });
        });
      }

      let option;
      switch (plotType) {
        case 'time-series': option = buildTimeSeriesOption(); break;
        case 'xy': option = buildXYOption(); break;
        case 'xyz': option = buildXYZOption(); break;
      }

      if (option) {
        try {
          chartInstance.setOption(option, true);
        } catch (e) {
          console.warn('ECharts render warning:', e.message);
        }
        requestAnimationFrame(() => chartInstance && chartInstance.resize());
      }

      // Global resize handler (single, persistent — no per-render listener needed)
    }

    function getChartMessage() {
      if (plotType === 'time-series' && selectedVars.length === 0) return t('msg_select_var');
      if (plotType === 'xy' && selectedVars.length < 2) return t('msg_xy_need');
      if (plotType === 'xyz' && selectedVars.length < 3) return t('msg_xyz_need');
      return null;
    }

    const BIT_COLORS = [
      '#3b82f6', '#22c55e', '#f59e0b', '#ef4444',
      '#8b5cf6', '#06b6d4', '#ec4899', '#84cc16',
    ];

    const SAMPLING_THRESHOLD = 10000; // apply LTTB sampling when data exceeds 10k rows

    function getBitColor(bit) {
      return BIT_COLORS[bit % BIT_COLORS.length];
    }

    function buildTimeSeriesOption() {
      const { rows, timeColumn } = data;
      const timeLabels = rows.map(row => {
        const val = row[timeColumn];
        if (val instanceof Date) return dayjs(val).format('YYYY-MM-DD HH:mm:ss');
        return String(val ?? '');
      });

      const formatTooltipTime = (dataIndex) => {
        const val = rows[dataIndex]?.[timeColumn];
        if (val instanceof Date) return dayjs(val).format('YYYY-MM-DD HH:mm:ss.SSS');
        return timeLabels[dataIndex] ?? '';
      };

      const varsToPlot = selectedVars.slice(0, 10);

      // Preserve zoom state across re-renders
      const zoomStart = restoreZoom ? restoreZoom.start : 0;
      const zoomEnd = restoreZoom ? restoreZoom.end : 100;
      restoreZoom = null;

      // Merged mode: all series in one chart, shared Y-axis
      if (timeSeriesMode === 'merged') {
        const tc = getThemeColors();
        const series = varsToPlot.map(variable => ({
          name: variable,
          type: 'line',
          data: rows.map(row => {
            const val = row[variable];
            if (val === null || val === undefined) return null;
            return Number(val);
          }),
          symbol: 'none',
          sampling: rows.length > SAMPLING_THRESHOLD ? 'lttb' : undefined,
        }));

        return {
          backgroundColor: isDark ? tc.bg : 'transparent',
          tooltip: {
            trigger: 'axis',
            formatter: (params) => {
              const title = formatTooltipTime(params[0]?.dataIndex);
              return title + '<br/>' + params.map(p => p.marker + ' ' + p.seriesName + ': ' + (p.value ?? '-')).join('<br/>');
            },
          },
          legend: { type: 'scroll', bottom: 0, textStyle: { fontSize: 12, color: tc.text } },
          grid: {
            left: '3%', right: '4%',
            bottom: varsToPlot.length > 5 ? '15%' : '10%',
            top: '3%', containLabel: true,
          },
          xAxis: {
            type: 'category', data: timeLabels,
            axisLabel: { rotate: timeLabels.length > 20 ? 45 : 0, fontSize: 11, color: tc.text },
            axisLine: { lineStyle: { color: tc.axisLine } },
          },
          yAxis: {
            type: 'value',
            name: varsToPlot.length === 1 ? varsToPlot[0] : '',
            nameTextStyle: { fontSize: 11, color: tc.text },
            axisLabel: { color: tc.text },
            splitLine: { lineStyle: { color: tc.splitLine } },
          },
          series,
          dataZoom: [
            { type: 'slider', start: zoomStart, end: zoomEnd, bottom: varsToPlot.length > 5 ? '8%' : '4%', borderColor: tc.splitLine, fillerColor: isDark ? 'rgba(59,130,246,0.2)' : 'rgba(59,130,246,0.1)', handleStyle: { color: tc.axisLine }, textStyle: { color: tc.text } },
            { type: 'inside', start: zoomStart, end: zoomEnd },
          ],
        };
      }

       // Separate mode: one subplot per variable (or per bit for binary vars)
      // Calculate total rows and bit layout
      const varLayout = []; // { variable, isBinVar, bitCount, rowCount }
      for (const variable of varsToPlot) {
        const isBinVar = binaryColumns.has(variable) && binaryMode.get(variable) === 'bin';
        const bitCount = isBinVar ? (binaryBits.get(variable) || 8) : 0;
        const rowCount = isBinVar ? bitCount : 1;
        varLayout.push({ variable, isBinVar, bitCount, rowCount });
      }

      const rowHeight = 200;
      // Binary block height: 8bit → 200px, 16bit → 400px (25px per bit)
      const rowHeightBit = 25;
      const gap = 20;
      const topPad = 8;
      const labelHeight = 10;
      const bottomGap = 8;

      const grids = [];
      const graphics = [];
      const xAxes = [];
      const yAxes = [];
      const series = [];

      const tc = getThemeColors();

      // Fixed left margin for strict alignment across all subplots
      const gridLeft = 60;
      const gridRight = 30;

      let rowIndex = 0;
      let cumulativeTop = topPad;

      for (let varIdx = 0; varIdx < varLayout.length; varIdx++) {
        const { variable, isBinVar, bitCount, rowCount } = varLayout[varIdx];
        if (isBinVar) {
          // Bits from top to bottom: bitN-1 → bit0
          for (let bitRow = bitCount - 1; bitRow >= 0; bitRow--) {
            const gridTop = cumulativeTop;

            grids.push({
              top: gridTop,
              left: gridLeft,
              right: gridRight,
              height: rowHeightBit,
              containLabel: false,
              show: true,
              borderColor: tc.gridBorder,
              borderWidth: 1,
              backgroundColor: tc.gridBg,
            });

            xAxes.push({
              type: 'category',
              data: timeLabels,
              gridIndex: rowIndex,
              axisLine: { show: false },
              axisTick: { show: false },
              axisLabel: { show: false },
              axisPointer: { show: true, type: 'line', lineStyle: { color: '#4f46e5', width: 2 } },
              position: 'bottom',
            });

            yAxes.push({
              type: 'value',
              gridIndex: rowIndex,
              show: true,
              name: `bit${bitRow}`,
              nameLocation: 'center',
              nameGap: 15,
              nameRotate: 0,
              nameTextStyle: {
                fontSize: 10,
                color: tc.subplotLabel,
              },
              axisLine: { show: false },
              axisTick: { show: false },
              axisLabel: {
                show: true,
                formatter: value => value === 0 ? '0' : '',
                fontSize: 10,
                color: tc.subplotLabel,
                margin: 2,
              },
              splitLine: { show: false },
              min: 0,
              max: 1.2,
              scale: false,
            });

            series.push({
              name: `${variable} · bit${bitRow}`,
              type: 'line',
              data: rows.map(row => {
                const val = Number(row[variable]);
                if (val === null || val === undefined || isNaN(val) || !isFinite(val)) return null;
                return (val >> bitRow) & 1;
              }),
              symbol: 'none',
              lineStyle: { width: 1.5 },
              xAxisIndex: rowIndex,
              yAxisIndex: rowIndex,
              itemStyle: { color: getBitColor(bitRow) },
              sampling: rows.length > SAMPLING_THRESHOLD ? 'lttb' : undefined,
            });

            cumulativeTop += rowHeightBit;
            rowIndex++;
          }

          // Variable name label below the bit block (same as decimal)
          graphics.push({
            type: 'text',
            left: 'center',
            top: cumulativeTop + 4,
            style: {
              text: variable,
              fill: tc.subplotLabel,
              font: 'bold 12px sans-serif',
            },
          });

          // Gap between variable blocks (not after the last one)
          if (varIdx < varLayout.length - 1) {
            cumulativeTop += gap;
          }
        } else {
          // Decimal: existing logic
          const gridTop = cumulativeTop;

          grids.push({
            top: gridTop,
            left: gridLeft,
            right: gridRight,
            height: rowHeight,
            containLabel: false,
            show: true,
            borderColor: tc.gridBorder,
            borderWidth: 1,
            backgroundColor: tc.gridBg,
          });

          xAxes.push({
            type: 'category',
            data: timeLabels,
            gridIndex: rowIndex,
            axisLine: { show: false },
            axisTick: { show: false },
            axisLabel: { show: false },
            axisPointer: { show: true, type: 'line', lineStyle: { color: '#4f46e5', width: 2 } },
            position: 'bottom',
          });

          const yAxisConfig = {
            type: 'value',
            gridIndex: rowIndex,
            show: true,
            axisLine: { show: true, onZero: false, lineStyle: { color: tc.axisLine } },
            axisTick: { show: true, lineStyle: { color: tc.axisLine } },
            axisLabel: { show: true, color: tc.subplotLabel, fontSize: 10, formatter: v => Number(v).toFixed(1) },
            splitLine: { show: true, lineStyle: { color: tc.splitLine, type: 'dashed' } },
          };

          if (separateAutoScale) {
            yAxisConfig.scale = true;
          } else {
            const range = data.valueRanges && data.valueRanges[variable];
            if (range) {
              const padding = (range.max - range.min) * 0.1;
              if (padding === 0) {
                yAxisConfig.min = range.min - 1;
                yAxisConfig.max = range.max + 1;
              } else {
                yAxisConfig.min = range.min - padding;
                yAxisConfig.max = range.max + padding;
              }
            } else {
              yAxisConfig.min = 0;
              yAxisConfig.max = 1;
            }
          }

          yAxes.push(yAxisConfig);

          series.push({
            name: variable,
            type: 'line',
            data: rows.map(row => {
              const val = row[variable];
              if (val === null || val === undefined || isNaN(Number(val)) || !isFinite(Number(val))) return null;
              return Number(val);
            }),
            symbol: 'none',
            xAxisIndex: rowIndex,
            yAxisIndex: rowIndex,
            lineStyle: { width: 1.5 },
            sampling: rows.length > SAMPLING_THRESHOLD ? 'lttb' : undefined,
          });

          // Variable name label below
          graphics.push({
            type: 'text',
            left: 'center',
            top: gridTop + rowHeight + 4,
            style: {
              text: variable,
              fill: tc.subplotLabel,
              font: 'bold 12px sans-serif',
            },
          });

          cumulativeTop += rowHeight;
          rowIndex++;

          // Gap between variable blocks (not after the last one)
          if (varIdx < varLayout.length - 1) {
            cumulativeTop += gap;
          }
        }
      }

      // All X axis indices for dataZoom synchronization
      const allXAxisIndices = Array.from({ length: rowIndex }, (_, idx) => idx);

      return {
        backgroundColor: tc.bg,
        tooltip: {
          show: true,
          trigger: 'axis',
          axisPointer: { type: 'line', lineStyle: { color: '#ff0000', width: 3 } },
          formatter: (params) => {
            const idx = params[0]?.dataIndex;
            const title = idx != null ? formatTooltipTime(idx) : '';
            // Binary bit series: show all bits with hovered bit highlighted
            const bitMatch = params[0]?.seriesName?.match(/^(.+) · bit(\d+)$/);
            if (bitMatch && idx != null) {
              const varName = bitMatch[1];
              const hoveredBit = parseInt(bitMatch[2], 10);
              const row = rows[idx];
              const rawVal = row ? Number(row[varName]) : 0;
              const val = (rawVal === null || rawVal === undefined || isNaN(rawVal) || !isFinite(rawVal)) ? 0 : rawVal;
              let lines = title + '<br/><span style="font-weight:bold;color:#4f46e5">' + varName + ' = ' + val + '</span>';
              const bitCount = binaryBits.get(varName) || 8;
              for (let b = bitCount - 1; b >= 0; b--) {
                const bitVal = (val >> b) & 1;
                const color = getBitColor(b);
                const marker = '<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:' + color + ';vertical-align:middle;margin-right:4px;"></span>';
                const label = marker + 'bit' + b + ': ' + bitVal;
                lines += b === hoveredBit
                  ? '<br/><span style="font-weight:bold;font-size:13px">' + label + '</span>'
                  : '<br/><span style="opacity:0.5">' + label + '</span>';
              }
              return lines;
            }
            return title + '<br/>' + params.map(p => p.marker + ' ' + p.seriesName + ': ' + (p.value ?? '-')).join('<br/>');
          },
        },
        graphic: graphics,
        grid: grids,
        xAxis: xAxes,
        yAxis: yAxes,
        series,
        animation: false,
        dataZoom: [
          {
            type: 'inside',
            xAxisIndex: allXAxisIndices,
            start: zoomStart,
            end: zoomEnd,
          },
        ],
      };
    }

    function buildXYOption() {
      const xVar = selectedVars[0];
      const yVar = selectedVars[1];
      const scatterData = data.rows
        .map(row => {
          const x = row[xVar];
          const y = row[yVar];
          if (x === null || x === undefined || y === null || y === undefined) return null;
          return [Number(x), Number(y)];
        })
        .filter(d => d !== null);

      const tc = getThemeColors();
      return {
        backgroundColor: isDark ? tc.bg : 'transparent',
        tooltip: {
          trigger: 'item',
          formatter: (params) => `${xVar}: ${params.data[0]}<br/>${yVar}: ${params.data[1]}`,
        },
        grid: { left: '3%', right: '4%', bottom: '3%', top: '3%', containLabel: true },
        xAxis: { type: 'value', name: xVar, nameLocation: 'center', nameGap: 25, nameTextStyle: { fontSize: 11, color: tc.text }, axisLabel: { color: tc.text }, splitLine: { lineStyle: { color: tc.splitLine } } },
        yAxis: { type: 'value', name: yVar, nameLocation: 'center', nameGap: 30, nameRotate: 90, nameTextStyle: { fontSize: 11, color: tc.text }, axisLabel: { color: tc.text }, splitLine: { lineStyle: { color: tc.splitLine } } },
        series: [{ type: 'scatter', data: scatterData, symbolSize: 4 }],
      };
    }

    function buildXYZOption() {
      const xVar = selectedVars[0];
      const yVar = selectedVars[1];
      const zVar = selectedVars[2];
      const rawData = data.rows
        .map(row => {
          const x = row[xVar];
          const y = row[yVar];
          const z = row[zVar];
          if (x === null || x === undefined || y === null || y === undefined || z === null || z === undefined) return null;
          return [Number(x), Number(y), Number(z)];
        })
        .filter(d => d !== null);

      const tc = getThemeColors();
      return {
        backgroundColor: isDark ? tc.bg : 'transparent',
        tooltip: {
          formatter: (params) => `${xVar}: ${params.data[0]}<br/>${yVar}: ${params.data[1]}<br/>${zVar}: ${params.data[2]}`,
        },
        xAxis3D: { type: 'value', name: xVar, nameTextStyle: { fontSize: 11, color: tc.text }, axisLabel: { color: tc.text } },
        yAxis3D: { type: 'value', name: yVar, nameTextStyle: { fontSize: 11, color: tc.text }, axisLabel: { color: tc.text } },
        zAxis3D: { type: 'value', name: zVar, nameTextStyle: { fontSize: 11, color: tc.text }, axisLabel: { color: tc.text } },
        grid3D: {
          boxWidth: 200, boxDepth: 80,
          viewControl: { autoRotate: false },
          light: { main: { intensity: isDark ? 0.8 : 1.2 } },
        },
        series: [{
          type: 'scatter3D',
          data: rawData,
          symbolSize: 4,
          itemStyle: { opacity: 0.8 },
        }],
      };
    }

    // Global resize (debounced)
    const debouncedResize = debounce(() => {
      if (chartInstance) chartInstance.resize();
    }, 100);
    window.addEventListener('resize', debouncedResize);

    // Kick off version check
    checkVersion();
    updateStaticTexts();
  </script>
</body>
</html>
